<svg width="100%" viewBox="0 0 720 590" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Microservices event-driven architecture</title>
  <desc>Products service (this repo) shown as part of a distributed event-driven system alongside Orders, Payments, a Message Broker, and a Notification service.</desc>

  <defs>
    <!-- Arrowhead for sync lines -->
    <marker id="arr-sync" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Arrowhead for async (dashed) lines -->
    <marker id="arr-async" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="590" fill="#f9fafb"/>

  <!-- ══════════════════════════════════════════════════════════
       TIER LABELS (left gutter, faint)
  ══════════════════════════════════════════════════════════ -->
  <text x="8" y="55"  font-size="9" fill="#d1d5db" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="1.2">CLIENT</text>
  <text x="8" y="138" font-size="9" fill="#d1d5db" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="1.2">GATEWAY</text>
  <text x="8" y="258" font-size="9" fill="#d1d5db" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="1.2">SERVICES</text>
  <text x="8" y="398" font-size="9" fill="#d1d5db" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="1.2">EVENT BUS</text>
  <text x="8" y="498" font-size="9" fill="#d1d5db" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="1.2">CONSUMERS</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 1 — CLIENT
  ══════════════════════════════════════════════════════════ -->
  <rect x="260" y="24" width="200" height="52" rx="8"
        fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="360" y="46" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#3730a3" font-family="system-ui,sans-serif">React frontend</text>
  <text x="360" y="63" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#6366f1" font-family="system-ui,sans-serif">TypeScript · Tailwind · Vite</text>

  <!-- CLIENT → GATEWAY -->
  <line x1="360" y1="76" x2="360" y2="108"
        stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <text x="366" y="96" font-size="10" fill="#9ca3af" font-family="system-ui,sans-serif">HTTPS / REST</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 2 — GATEWAY
  ══════════════════════════════════════════════════════════ -->
  <rect x="175" y="108" width="370" height="52" rx="8"
        fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="360" y="128" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#374151" font-family="system-ui,sans-serif">API Gateway</text>
  <text x="360" y="146" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#6b7280" font-family="system-ui,sans-serif">Auth · routing · rate-limiting · CORS</text>

  <!-- GATEWAY → Products -->
  <path d="M230 160 C230 188 121 188 121 210"
        fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <!-- GATEWAY → Orders -->
  <line x1="360" y1="160" x2="360" y2="210"
        stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <!-- GATEWAY → Payments -->
  <path d="M490 160 C490 188 599 188 599 210"
        fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>

  <!-- ══════════════════════════════════════════════════════════
       ROW 3 — SERVICES
  ══════════════════════════════════════════════════════════ -->

  <!-- Products service — highlighted as "this repo" -->
  <rect x="26" y="210" width="190" height="78" rx="8"
        fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <!-- "this repo" badge -->
  <rect x="74" y="197" width="66" height="18" rx="9" fill="#059669"/>
  <text x="107" y="206" text-anchor="middle" dominant-baseline="central"
        font-size="9" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">★ this repo</text>
  <text x="121" y="234" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#065f46" font-family="system-ui,sans-serif">Products service</text>
  <text x="121" y="252" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#059669" font-family="system-ui,sans-serif">CRUD · colour filter</text>
  <text x="121" y="268" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#059669" font-family="system-ui,sans-serif">.NET 8 · Clean Arch · EF Core</text>

  <!-- Orders service -->
  <rect x="265" y="210" width="190" height="78" rx="8"
        fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="360" y="234" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#065f46" font-family="system-ui,sans-serif">Orders service</text>
  <text x="360" y="252" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#10b981" font-family="system-ui,sans-serif">Create &amp; manage orders</text>
  <text x="360" y="268" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#10b981" font-family="system-ui,sans-serif">Publishes OrderCreated</text>

  <!-- Payments service -->
  <rect x="504" y="210" width="190" height="78" rx="8"
        fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="599" y="234" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#065f46" font-family="system-ui,sans-serif">Payments service</text>
  <text x="599" y="252" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#10b981" font-family="system-ui,sans-serif">Process transactions</text>
  <text x="599" y="268" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#10b981" font-family="system-ui,sans-serif">Publishes PaymentProcessed</text>

  <!-- ══════════════════════════════════════════════════════════
       PUBLISH ARROWS  (dashed)  services → broker
  ══════════════════════════════════════════════════════════ -->
  <!-- Products → Broker -->
  <path d="M121 288 L121 350 L240 374"
        fill="none" stroke="#9ca3af" stroke-width="1.5"
        stroke-dasharray="5 3" marker-end="url(#arr-async)"/>
  <text x="30" y="335" font-size="10" fill="#9ca3af" font-family="system-ui,sans-serif">StockUpdated</text>

  <!-- Orders → Broker -->
  <line x1="360" y1="288" x2="360" y2="374"
        stroke="#9ca3af" stroke-width="1.5"
        stroke-dasharray="5 3" marker-end="url(#arr-async)"/>
  <text x="366" y="335" font-size="10" fill="#9ca3af" font-family="system-ui,sans-serif">OrderCreated</text>

  <!-- Payments → Broker -->
  <path d="M599 288 L599 350 L480 374"
        fill="none" stroke="#9ca3af" stroke-width="1.5"
        stroke-dasharray="5 3" marker-end="url(#arr-async)"/>
  <text x="527" y="335" font-size="10" fill="#9ca3af" font-family="system-ui,sans-serif">PaymentProcessed</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 4 — MESSAGE BROKER
  ══════════════════════════════════════════════════════════ -->
  <rect x="190" y="374" width="340" height="52" rx="8"
        fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="360" y="394" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#78350f" font-family="system-ui,sans-serif">Message Broker</text>
  <text x="360" y="412" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#d97706" font-family="system-ui,sans-serif">RabbitMQ / Azure Service Bus</text>

  <!-- ══════════════════════════════════════════════════════════
       SUBSCRIBE ARROWS  (solid)  broker → consumers
  ══════════════════════════════════════════════════════════ -->
  <!-- Broker → Notification -->
  <path d="M230 426 L160 462"
        fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <text x="166" y="442" font-size="10" fill="#9ca3af" font-family="system-ui,sans-serif">all events</text>

  <!-- Broker → Payments (back up — subscribes to OrderCreated) -->
  <path d="M490 374 Q660 362 599 288"
        fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <text x="610" y="338" font-size="10" fill="#9ca3af" font-family="system-ui,sans-serif">OrderCreated</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 5 — CONSUMERS
  ══════════════════════════════════════════════════════════ -->
  <!-- Notification service -->
  <rect x="40" y="462" width="200" height="72" rx="8"
        fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="140" y="484" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#831843" font-family="system-ui,sans-serif">Notification service</text>
  <text x="140" y="502" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#db2777" font-family="system-ui,sans-serif">Email · SMS · Push alerts</text>
  <text x="140" y="518" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#db2777" font-family="system-ui,sans-serif">Subscribes to all events</text>

  <!-- ══════════════════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════════════ -->
  <rect x="36" y="552" width="648" height="30" rx="6"
        fill="none" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- sync -->
  <line x1="56" y1="567" x2="96" y2="567"
        stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <text x="104" y="567" dominant-baseline="central"
        font-size="11" fill="#6b7280" font-family="system-ui,sans-serif">Synchronous (REST)</text>

  <!-- async publish -->
  <line x1="258" y1="567" x2="298" y2="567"
        stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-async)"/>
  <text x="306" y="567" dominant-baseline="central"
        font-size="11" fill="#6b7280" font-family="system-ui,sans-serif">Async publish (event)</text>

  <!-- async subscribe -->
  <line x1="468" y1="567" x2="508" y2="567"
        stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-sync)"/>
  <text x="516" y="567" dominant-baseline="central"
        font-size="11" fill="#6b7280" font-family="system-ui,sans-serif">Async subscribe</text>

</svg>
